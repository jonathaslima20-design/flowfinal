<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- White background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Corner accents -->
  <!-- Top-left yellow -->
  <rect x="0" y="0" width="180" height="180" fill="#FACC15" stroke="#000000" stroke-width="3"/>
  <!-- Bottom-right lime -->
  <rect x="1020" y="450" width="180" height="180" fill="#BEF264" stroke="#000000" stroke-width="3"/>
  <!-- Top-right blue -->
  <rect x="1120" y="0" width="80" height="80" fill="#2563EB" stroke="#000000" stroke-width="3"/>
  <!-- Bottom-left red -->
  <rect x="0" y="550" width="80" height="80" fill="#EF4444" stroke="#000000" stroke-width="3"/>

  <!-- Main card container -->
  <rect x="150" y="80" width="900" height="470" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <!-- Card shadow -->
  <rect x="160" y="90" width="900" height="470" fill="#000000" rx="0"/>
  <rect x="150" y="80" width="900" height="470" fill="#ffffff" stroke="#000000" stroke-width="4"/>

  <!-- Lightning bolt icon background square -->
  <rect x="544" y="115" width="112" height="112" fill="#000000"/>
  <rect x="540" y="111" width="112" height="112" fill="#2563EB" stroke="#000000" stroke-width="4"/>

  <!-- Lightning bolt SVG path centered in square -->
  <polygon points="613,125 575,181 596,181 587,215 625,159 604,159 613,125"
    fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>

  <!-- Primary headline -->
  <text x="600" y="285" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="-1">Um link para compartilhar</text>
  <text x="600" y="343" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="-1">tudo o que importa</text>

  <!-- Secondary text badge shadow -->
  <rect x="254" y="396" width="696" height="56" fill="#000000"/>
  <!-- Secondary text badge -->
  <rect x="250" y="392" width="696" height="56" fill="#FACC15" stroke="#000000" stroke-width="3"/>
  <text x="598" y="427" font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="700" fill="#000000" text-anchor="middle">Crie uma página de bio link em minutos</text>
</svg>
